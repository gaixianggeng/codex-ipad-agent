name: Mimi TestFlight 内测

on:
  push:
    branches: [main]
    paths:
      - 'ios/MimiRemote/**'
      - '.github/workflows/mimi-testflight.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 要发布的 Git commit、tag 或分支
        required: true
        default: main
        type: string
      what_to_test:
        description: TestFlight 的“测试内容”
        required: true
        type: string
      xcode_path:
        description: 可选 Xcode 路径
        required: false
        default: /Applications/Xcode-beta.app
        type: string

permissions:
  contents: read

concurrency:
  group: mimi-testflight
  cancel-in-progress: false

jobs:
  publish:
    # 仓库专用标签防止其他项目占用本机的 iOS 发布环境。
    runs-on: [self-hosted, macOS, ARM64, mimi-testflight]
    timeout-minutes: 90
    env:
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
      DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
      TESTFLIGHT_BETA_GROUP_NAME: ${{ vars.TESTFLIGHT_BETA_GROUP_NAME }}
      TESTFLIGHT_BETA_GROUP_ID: ${{ vars.TESTFLIGHT_BETA_GROUP_ID }}
      TESTFLIGHT_WHATS_NEW: ${{ inputs.what_to_test || format('自动内测：{0}', github.event.head_commit.message) }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_PATH: ${{ vars.MIMI_ASC_API_KEY_PATH || '/Users/gaixiaotongxue/secure/AuthKey_6WL48ZRJB6.p8' }}
      XCODE_APP_PATH: ${{ inputs.xcode_path || '/Applications/Xcode-beta.app' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: 检查本机发布环境
        run: |
          set -euo pipefail

          # 持久 runner 不修改系统 xcode-select，避免并发任务互相影响。
          developer_dir="$XCODE_APP_PATH/Contents/Developer"
          test -d "$developer_dir"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$developer_dir"
          xcodebuild -version
          xcrun altool --version

          test -n "$IOS_BUNDLE_ID"
          test -n "$DEVELOPMENT_TEAM"
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_ISSUER_ID"
          test -f "$APP_STORE_CONNECT_API_KEY_PATH"

          # 本机 runner 复用 login keychain 中的证书，不每次创建和遗留临时 keychain。
          if ! security find-identity -v -p codesigning \
            | grep -E '"(Apple|iPhone) Distribution:.*\('"$DEVELOPMENT_TEAM"'\)"'; then
            echo "未找到团队 $DEVELOPMENT_TEAM 的 Distribution 签名证书" >&2
            exit 1
          fi

          # 按 bundle id 动态查找已安装的 App Store profile，避免续期后绑定旧 UUID。
          profile_plist="$RUNNER_TEMP/mimi-installed-profile.plist"
          profile_name=""
          shopt -s nullglob
          for profile in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            security cms -D -i "$profile" > "$profile_plist" 2>/dev/null || continue
            application_identifier="$(plutil -extract Entitlements.application-identifier raw -o - "$profile_plist" 2>/dev/null || true)"
            # App Store profile 不包含 ProvisionedDevices，避免误选开发或 Ad Hoc profile。
            if [[ "$application_identifier" == "$DEVELOPMENT_TEAM.$IOS_BUNDLE_ID" ]] \
              && ! plutil -extract ProvisionedDevices xml1 -o - "$profile_plist" >/dev/null 2>&1; then
              profile_name="$(plutil -extract Name raw -o - "$profile_plist")"
              break
            fi
          done
          rm -f "$profile_plist"
          if [[ -z "$profile_name" ]]; then
            echo "未找到 $IOS_BUNDLE_ID 的 App Store provisioning profile" >&2
            exit 1
          fi
          echo "IOS_PROVISIONING_PROFILE_SPECIFIER=$profile_name" >> "$GITHUB_ENV"

      - name: 归档并导出 IPA
        run: |
          set -euo pipefail
          build_number="$((100000 + GITHUB_RUN_NUMBER))"
          marketing_version="1.0"
          output="$RUNNER_TEMP/mimi-$marketing_version-$build_number"
          archive="$output/MimiRemote.xcarchive"
          export_path="$output/export"
          export_options="$output/ExportOptions.plist"
          # 先记录输出目录，即使归档失败，always 步骤也能清理。
          echo "IOS_OUTPUT_PATH=$output" >> "$GITHUB_ENV"
          mkdir -p "$output"
          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>manageAppVersionAndBuildNumber</key><false/>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$DEVELOPMENT_TEAM</string>
            <key>provisioningProfiles</key>
            <dict><key>$IOS_BUNDLE_ID</key><string>$IOS_PROVISIONING_PROFILE_SPECIFIER</string></dict>
          </dict>
          </plist>
          PLIST
          xcodebuild archive \
            -project ios/MimiRemote/MimiRemote.xcodeproj \
            -scheme MimiRemote \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            MARKETING_VERSION="$marketing_version" \
            CURRENT_PROJECT_VERSION="$build_number" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='Apple Distribution' \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            -quiet
          xcodebuild -exportArchive \
            -archivePath "$archive" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$export_options" \
            -quiet
          ipa="$export_path/MimiRemote.ipa"
          test -f "$ipa"
          echo "IOS_IPA_PATH=$ipa" >> "$GITHUB_ENV"
          echo "IOS_MARKETING_VERSION=$marketing_version" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"

      - name: 上传到 App Store Connect
        run: |
          set -euo pipefail
          # 使用 Xcode 自带的上传器，避免在持久 runner 上维护全局 fastlane/Ruby 环境。
          xcrun altool --upload-app \
            --file "$IOS_IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --p8-file-path "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: 精确分发到咪咪 Internal
        run: |
          set -euo pipefail
          ruby scripts/distribute_internal_build.rb "$IOS_IPA_PATH"

      - name: 清理本地构建产物
        if: ${{ always() }}
        run: |
          set -euo pipefail
          # 只删除本次在 RUNNER_TEMP 中生成的目录，避免持久机磁盘累积。
          if [[ -n "${IOS_OUTPUT_PATH:-}" && "$IOS_OUTPUT_PATH" == "$RUNNER_TEMP"/mimi-* ]]; then
            rm -rf "$IOS_OUTPUT_PATH"
          fi
