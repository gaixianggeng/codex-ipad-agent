<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Codex" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Codex iPad Agent</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="stylesheet" href="/vendor/xterm/xterm.css" />
    <link rel="stylesheet" href="/app.css?v=11" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">C</div>
          <div>
            <h1>Codex</h1>
            <p id="endpoint">未连接</p>
          </div>
        </div>

        <section class="auth-card">
          <input id="token-input" type="password" autocomplete="off" placeholder="AGENTD_TOKEN" />
          <button id="save-token">连接</button>
        </section>

        <section class="project-card">
          <div class="section-row">
            <span>项目</span>
            <button id="refresh-projects" class="text-button">刷新</button>
          </div>
          <select id="project-select"></select>
          <p id="project-path">暂无项目</p>
        </section>

        <section class="session-card">
          <div class="section-row">
            <span>会话</span>
            <button id="new-session" class="text-button">新任务</button>
          </div>
          <div id="sessions-list" class="sessions-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <header class="workspace-top">
          <div>
            <div id="active-title" class="active-title">选择项目后开始任务</div>
            <div id="session-id" class="session-id">Session: -</div>
          </div>
          <div class="status-group">
            <span id="api-status" class="pill warn">未认证</span>
            <span id="session-status" class="pill">无会话</span>
            <button id="start-session" class="primary">启动</button>
            <button id="stop-session" class="danger" disabled>停止</button>
          </div>
        </header>

        <section id="messages" class="messages">
          <div class="empty-state">
            <h2>今天要让 Codex 做什么？</h2>
            <p>左侧选择项目和历史会话。中间是对话区，右侧是完整终端日志。</p>
          </div>
        </section>

        <footer class="composer">
          <textarea id="prompt-input" rows="4" placeholder="输入任务或后续指令。点发送会提交给当前 Codex 会话；没有会话时会新建一个。"></textarea>
          <div class="composer-actions">
            <span class="hint">发送：按钮或 ⌘/Ctrl + Enter</span>
            <div class="composer-buttons">
              <button id="send-ctrl-c" class="ghost danger-text" disabled>Ctrl+C</button>
              <button id="send-enter" class="ghost" disabled>Enter</button>
              <button id="send-input" class="primary" disabled>发送</button>
            </div>
          </div>
        </footer>
      </main>

      <aside class="log-panel">
        <div class="terminal-toolbar">
          <span>终端日志</span>
          <div class="row compact">
            <button id="auto-scroll" class="log-toggle" type="button">跟随开启</button>
            <button id="clear-output" class="ghost">清屏</button>
          </div>
        </div>
        <div id="terminal-output" aria-label="Codex terminal"></div>
      </aside>
    </div>

    <script src="/vendor/xterm/xterm.js"></script>
    <script src="/vendor/addon-fit/addon-fit.js"></script>
    <script src="/terminal-log.js?v=11"></script>
    <script src="/app.js?v=11"></script>
  </body>
</html>
