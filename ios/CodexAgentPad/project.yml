name: CodexAgentPad
options:
  bundleIdPrefix: com.gaixiaotongxue
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
targets:
  CodexAgentPad:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gaixiaotongxue.CodexAgentPad
        PRODUCT_NAME: CodexAgentPad
        INFOPLIST_FILE: Resources/Info.plist
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: "NO"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
  CodexAgentPadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CodexAgentPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gaixiaotongxue.CodexAgentPadTests
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CodexAgentPad.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CodexAgentPad"
        BUNDLE_LOADER: "$(TEST_HOST)"
